<!DOCTYPE html>
<html>
<body>
    <h2>Interactive Infographic - Pie Chart</h2>
    <svg width="200" height="200" viewBox="0 0 32 32">
        <!-- Background Circle -->
        <circle r="16" cx="16" cy="16" fill="#ddd"></circle>

        <!-- Segment 1 (25%) -->
        <circle r="16" cx="16" cy="16" fill="transparent" 
            stroke="#4caf50" stroke-width="32" stroke-dasharray="25 75" 
            transform="rotate(-90) translate(-32)"></circle>

        <!-- Segment 2 (50%) -->
        <circle r="16" cx="16" cy="16" fill="transparent" 
            stroke="#2196f3" stroke-width="32" stroke-dasharray="50 50" 
            transform="rotate(-90) translate(-32)" 
            style="stroke-dashoffset: -25;"></circle>

        <!-- Segment 3 (25%) -->
        <circle r="16" cx="16" cy="16" fill="transparent" 
            stroke="#ff5722" stroke-width="32" stroke-dasharray="25 75" 
            transform="rotate(-90) translate(-32)" 
            style="stroke-dashoffset: -75;"></circle>
    </svg>
</body>
</html>
